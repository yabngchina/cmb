<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>生成 RSA 密钥对</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    button:hover { background: #2563eb; }
    .output {
      background: #f1f5f9;
      border-radius: 0.5rem;
      padding: 1rem;
      margin-bottom: 1rem;
      word-break: break-all;
      font-family: monospace;
      font-size: 0.875rem;
      max-height: 200px;
      overflow-y: auto;
    }
    .label {
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #1e293b;
    }
    .copy-btn {
      background: #64748b;
      padding: 0.375rem 0.75rem;
      font-size: 0.75rem;
      margin-left: 0.5rem;
    }
    .copy-btn:hover { background: #475569; }
    .env-config {
      background: #0f172a;
      color: #e2e8f0;
      padding: 1rem;
      border-radius: 0.5rem;
      margin-top: 1rem;
      font-family: monospace;
      font-size: 0.75rem;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>生成 RSA 密钥对</h1>
  <p>点击按钮生成 2048 位 RSA 密钥对，用于 Cf-Github-ImgBed 加密认证。</p>
  
  <button onclick="generateKeys()">生成密钥对</button>
  
  <div id="result" style="display:none;">
    <div class="label">公钥 (PEM 格式)：</div>
    <div class="output" id="publicKeyPem"></div>
    
    <div class="label">私钥 (PEM 格式)：<span style="color:#dc2626;">⚠️ 请妥善保管</span></div>
    <div class="output" id="privateKeyPem"></div>
    
    <div class="label">
      公钥 Base64 (环境变量用)：
      <button class="copy-btn" onclick="copyToClipboard('publicKeyBase64')">复制</button>
    </div>
    <div class="output" id="publicKeyBase64"></div>
    
    <div class="label">
      私钥 Base64 (环境变量用)：
      <button class="copy-btn" onclick="copyToClipboard('privateKeyBase64')">复制</button>
    </div>
    <div class="output" id="privateKeyBase64"></div>
    
    <div class="label">Cloudflare Pages 环境变量配置（可直接复制）：</div>
    <div class="env-config" id="envConfig"></div>
  </div>

  <script>
    async function generateKeys() {
      // 生成 RSA-OAEP 密钥对
      const keyPair = await crypto.subtle.generateKey(
        {
          name: "RSA-OAEP",
          modulusLength: 2048,
          publicExponent: new Uint8Array([1, 0, 1]),
          hash: "SHA-256"
        },
        true,
        ["encrypt", "decrypt"]
      );

      // 导出公钥 (spki 格式)
      const publicKeyBuffer = await crypto.subtle.exportKey("spki", keyPair.publicKey);
      const publicKeyBase64 = arrayBufferToBase64(publicKeyBuffer);
      const publicKeyPem = `-----BEGIN PUBLIC KEY-----\n${chunkString(publicKeyBase64, 64)}\n-----END PUBLIC KEY-----`;

      // 导出私钥 (pkcs8 格式)
      const privateKeyBuffer = await crypto.subtle.exportKey("pkcs8", keyPair.privateKey);
      const privateKeyBase64 = arrayBufferToBase64(privateKeyBuffer);
      const privateKeyPem = `-----BEGIN PRIVATE KEY-----\n${chunkString(privateKeyBase64, 64)}\n-----END PRIVATE KEY-----`;

      // 显示结果
      document.getElementById('result').style.display = 'block';
      document.getElementById('publicKeyPem').textContent = publicKeyPem;
      document.getElementById('privateKeyPem').textContent = privateKeyPem;
      document.getElementById('publicKeyBase64').textContent = publicKeyBase64;
      document.getElementById('privateKeyBase64').textContent = privateKeyBase64;
      document.getElementById('envConfig').textContent = 
        `RSA_PUBLIC_KEY=${publicKeyBase64}\nRSA_PRIVATE_KEY=${privateKeyBase64}`;
    }

    function arrayBufferToBase64(buffer) {
      const bytes = new Uint8Array(buffer);
      let binary = '';
      for (let i = 0; i < bytes.byteLength; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return btoa(binary);
    }

    function chunkString(str, len) {
      return str.match(new RegExp(`.{1,${len}}`, 'g')).join('\n');
    }

    function copyToClipboard(id) {
      const text = document.getElementById(id).textContent;
      navigator.clipboard.writeText(text).then(() => {
        alert('已复制到剪贴板！');
      });
    }
  </script>
</body>
</html>
